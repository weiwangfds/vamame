name: Build & Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── CI: check + test on every push ──────────────────────────────────
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: oscilloscope

      - name: Check
        run: cargo check --manifest-path oscilloscope/Cargo.toml

      - name: Test
        run: cargo test --manifest-path oscilloscope/Cargo.toml

  # ── Build Windows release binary ────────────────────────────────────
  build-windows:
    name: Windows x86_64
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: oscilloscope

      - name: Build release
        run: cargo build --manifest-path oscilloscope/Cargo.toml --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oscilloscope-windows-x86_64
          path: oscilloscope/target/release/oscilloscope.exe

  # ── Release: publish binary when a version tag is pushed ─────────────
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: oscilloscope-windows-x86_64
          path: ./release-assets

      - name: Rename binary
        run: |
          mv ./release-assets/oscilloscope.exe \
             ./release-assets/oscilloscope-${{ github.ref_name }}-windows-x86_64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Oscilloscope ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ./release-assets/*.exe
